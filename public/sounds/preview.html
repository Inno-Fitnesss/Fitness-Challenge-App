<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Exercise Session Sounds</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f2f3f5;
        color: #29292d;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        display: grid;
        gap: 16px;
      }

      section {
        padding: 18px;
        border: 1px solid #d8dde3;
        border-radius: 8px;
        background: #ffffff;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        line-height: 1.2;
      }

      h2 {
        font-size: 15px;
        line-height: 1.3;
      }

      p {
        margin-top: 6px;
        color: #66717a;
        font-size: 13px;
        line-height: 1.5;
      }

      audio {
        margin-top: 12px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Exercise Session Sounds</h1>

      <section>
        <h2>Rep confirmed</h2>
        <p>Short bright pop for a clean counted rep.</p>
        <audio controls src="./rep-confirm.wav"></audio>
      </section>

      <section>
        <h2>Completion ta-da</h2>
        <p>Positive success chime for reaching the exercise goal.</p>
        <audio controls src="./completion-ta-da.wav"></audio>
      </section>
    </main>
  </body>
</html>
