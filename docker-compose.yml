services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/postgres
      JWT_SECRET: 9019fd0335fa9d8a97714daa246ebe09
      JWT_ALGORITHM: HS256
      CORS_ORIGINS: "*"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-WOWFIT}
      WITHINGS_CLIENT_ID: 8757257514f493dad3e2a502ec1ae93263f13494ed7a6d60132a45d3ebe39d1b
      WITHINGS_CLIENT_SECRET: fa5e7275d571c65c1db80465e11d4f45e88d10fea6d85fc04b3d922d6c387f6d
      WITHINGS_REDIRECT_URI: https://hi-baam.space/api/me/withings/callback
      FRONTEND_URL: https://hi-baam.space
    ports:
      - "127.0.0.1:8001:80"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
