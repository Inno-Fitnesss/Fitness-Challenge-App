server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API requests are proxied to the backend (same origin, no CORS needed)
    location /api/ {
        proxy_pass http://backend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API docs (Swagger / ReDoc / OpenAPI) on the same origin
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:80;
        proxy_set_header Host $host;
    }

    # Service worker: НИКОГДА не кэшировать. Браузер сравнивает sw.js байт в
    # байт, чтобы узнать о новой версии приложения; закэшированный sw.js =
    # намертво залипшая PWA. Точные location-совпадения побеждают regex ниже.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Хэшированные ассеты сборки: кэшировать навсегда. Отсутствующие файлы —
    # честный 404, иначе устаревший html загрузит index.html вместо js/css.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Прочая статика (иконки, звуки, видео с техникой упражнений): кэш на
    # день, файлы меняются редко, но не хэшированы в имени.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|wav|mp3|woff2?|mp4|webm)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # SPA: index.html не кэшировать, чтобы деплой подхватывался сразу
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
