server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API requests are proxied to the backend (same origin, no CORS needed)
    location /api/ {
        proxy_pass http://backend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Backend API docs (Swagger / ReDoc / OpenAPI) on the same origin
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:80;
        proxy_set_header Host $host;
    }

    # Hashed build assets can be cached aggressively. Missing assets must be
    # real 404s, otherwise stale mobile HTML can load index.html as JS/CSS.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|avif|wav|mp3|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA: serve static files, fall back to index.html for app routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
